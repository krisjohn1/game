<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rocket Crash 🚀 – Lucky Star Casino</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .crash-container {
      max-width: 800px;
      margin: 40px auto;
      background: var(--dark-card);
      border: 1px solid var(--dark-border);
      border-radius: var(--radius);
      padding: 40px;
      text-align: center;
    }
    
    .game-screen {
      background: #0b0c10;
      border-radius: var(--radius-sm);
      border: 1px solid var(--dark-border);
      height: 300px;
      margin: 20px 0 30px;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .multiplier-display {
      font-family: 'Orbitron', monospace;
      font-size: 6rem;
      font-weight: 900;
      color: white;
      z-index: 2;
      text-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
    }
    .multiplier-display.crashed {
      color: #ff3366;
      text-shadow: 0 0 30px rgba(255, 51, 102, 0.5);
    }
    .multiplier-display.win {
      color: #00ff88;
      text-shadow: 0 0 30px rgba(0, 255, 136, 0.5);
    }

    .crash-message {
      font-family: 'Orbitron', monospace;
      font-size: 1.5rem;
      color: #ff3366;
      margin-top: 10px;
      opacity: 0;
      transition: opacity 0.3s;
      z-index: 2;
    }

    .rocket-icon {
      font-size: 3rem;
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      transition: bottom 0.1s linear, font-size 2s ease-out;
      z-index: 1;
    }

    .crash-controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 30px;
    }
    .control-group {
      background: rgba(255,255,255,0.02);
      padding: 20px;
      border: 1px solid var(--dark-border);
      border-radius: var(--radius-sm);
    }
    .control-label {
      display: block;
      color: var(--gold);
      font-family: 'Orbitron', monospace;
      font-size: 0.9rem;
      margin-bottom: 10px;
    }
    .control-input {
      width: 100%;
      background: rgba(0,0,0,0.5);
      border: 1px solid var(--dark-border);
      color: white;
      padding: 12px;
      font-family: 'Orbitron', monospace;
      font-size: 1.2rem;
      text-align: center;
      border-radius: 4px;
    }
    
    .btn-play {
      width: 100%;
      padding: 20px;
      font-size: 1.5rem;
      font-family: 'Orbitron', monospace;
      font-weight: 900;
      background: linear-gradient(135deg, #1A2980, #26D0CE);
      color: white;
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 2px;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .btn-play:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 20px rgba(38, 208, 206, 0.4);
    }
    .btn-play:disabled {
      background: #333;
      color: #666;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }
  </style>
</head>
<body>
  <div id="particles-container"></div>

  <!-- Navigation -->
  <nav id="main-nav">
    <div class="nav-brand">
      <span class="star-icon">⭐</span>
      <span class="brand-text">Lucky<span class="highlight">Star</span></span>
    </div>
    <div class="nav-links">
      <a href="index.html" class="nav-link" style="color:var(--gold);">⬅ Lobby Kasino</a>
    </div>
    <div class="nav-auth" id="nav-auth-guest">
      <button class="btn-secondary" id="btn-login-nav">Login</button>
      <button class="btn-primary" id="btn-register-nav" style="padding: 8px 16px; font-size: 0.9rem;">Register</button>
    </div>
    <div class="nav-wallet" id="nav-auth-user" style="display: none;">
      <div class="wallet-display">
        <span class="wallet-icon">👤</span>
        <span class="wallet-label" id="nav-username">User</span>
      </div>
      <div class="wallet-display">
        <span class="wallet-icon">💰</span>
        <span class="wallet-label">Saldo</span>
        <span class="wallet-amount" id="nav-balance">Rp 0</span>
      </div>
      <button class="btn-topup" id="btn-topup-nav">+ Top Up</button>
      <button class="btn-secondary" id="btn-withdraw-nav" style="padding: 8px 16px; font-size: 0.9rem; border-color: #dc143c; color: #dc143c;">Tarik</button>
      <button class="btn-secondary" id="btn-logout-nav" style="padding: 8px 16px; font-size: 0.9rem;">Logout</button>
      <a href="admin.html" class="btn-primary" id="btn-admin-nav" style="display: none; padding: 8px 16px; font-size: 0.9rem; text-decoration: none;">Admin</a>
    </div>
  </nav>

  <!-- Game Area -->
  <div class="crash-container">
    <h2 style="font-family: 'Orbitron', monospace; color: var(--gold); margin-bottom: 10px;">🚀 ROCKET CRASH</h2>
    <p style="color: var(--text-secondary); margin-bottom: 20px;">Tentukan batas Cashout sebelum roket meledak!</p>
    
    <div class="game-screen">
      <div class="rocket-icon" id="rocket">🚀</div>
      <div class="multiplier-display" id="multiplier">1.00x</div>
      <div class="crash-message" id="crash-msg">💥 BANG! 💥</div>
    </div>

    <div class="crash-controls">
      <div class="control-group">
        <label class="control-label">Taruhan (Rp)</label>
        <input type="number" id="crash-bet" class="control-input" value="10000" min="1000" step="1000">
      </div>
      
      <div class="control-group">
        <label class="control-label">Auto Cashout (x)</label>
        <input type="number" id="crash-target" class="control-input" value="2.00" min="1.01" step="0.01">
      </div>
    </div>

    <button class="btn-play" id="btn-play">🚀 MULAI MELUNCUR</button>
  </div>

  <!-- Auth Modals -->
  <div class="modal-overlay" id="login-modal">
    <div class="modal-box">
      <div class="modal-header">
        <h3>🔐 Login</h3>
        <button class="modal-close" id="close-login">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-group" style="margin-bottom: 15px;">
          <input type="text" id="login-username" placeholder="Username" style="width: 100%; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid var(--dark-border); color: white; border-radius: var(--radius-sm); font-family: 'Rajdhani', sans-serif; font-size: 1rem;" />
        </div>
        <div class="form-group" style="margin-bottom: 20px;">
          <input type="password" id="login-password" placeholder="Password" style="width: 100%; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid var(--dark-border); color: white; border-radius: var(--radius-sm); font-family: 'Rajdhani', sans-serif; font-size: 1rem;" />
        </div>
        <button class="btn-primary" id="submit-login" style="width: 100%; padding: 12px;">Login</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="register-modal">
    <div class="modal-box">
      <div class="modal-header">
        <h3>📝 Register</h3>
        <button class="modal-close" id="close-register">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-group" style="margin-bottom: 15px;">
          <input type="text" id="register-username" placeholder="Username" style="width: 100%; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid var(--dark-border); color: white; border-radius: var(--radius-sm); font-family: 'Rajdhani', sans-serif; font-size: 1rem;" />
        </div>
        <div class="form-group" style="margin-bottom: 20px;">
          <input type="password" id="register-password" placeholder="Password" style="width: 100%; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid var(--dark-border); color: white; border-radius: var(--radius-sm); font-family: 'Rajdhani', sans-serif; font-size: 1rem;" />
        </div>
        <button class="btn-primary" id="submit-register" style="width: 100%; padding: 12px;">Register</button>
      </div>
    </div>
  </div>

  <!-- Withdraw Modal -->
  <div class="modal-overlay" id="withdraw-modal">
    <div class="modal-box">
      <div class="modal-header">
        <h3>💸 Tarik Saldo</h3>
        <button class="modal-close" id="close-withdraw">✕</button>
      </div>
      <div class="modal-body">
        <p class="modal-desc">Masukkan jumlah yang ingin ditarik dan nomor rekening Anda.</p>
        <div class="form-group" style="margin-bottom: 15px;">
          <input type="number" id="withdraw-amount" placeholder="Jumlah (Min 50.000)" min="50000" step="10000" style="width: 100%; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid var(--dark-border); color: white; border-radius: var(--radius-sm); font-family: 'Rajdhani', sans-serif; font-size: 1rem;" />
        </div>
        <div class="form-group" style="margin-bottom: 20px;">
          <input type="text" id="withdraw-account" placeholder="Nomor Rekening / E-Wallet" style="width: 100%; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid var(--dark-border); color: white; border-radius: var(--radius-sm); font-family: 'Rajdhani', sans-serif; font-size: 1rem;" />
        </div>
        <button class="btn-primary" id="submit-withdraw" style="width: 100%; padding: 12px;">Proses Penarikan</button>
      </div>
    </div>
  </div>

  <script src="auth.js"></script>
  <script src="crash.js"></script>
</body>
</html>
